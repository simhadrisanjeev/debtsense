# =============================================================================
# DebtSense — Redis Production Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
tcp-keepalive 300
timeout 0

# ---------------------------------------------------------------------------
# Memory Management
# ---------------------------------------------------------------------------

# Maximum memory limit — adjust based on container memory allocation
maxmemory 256mb

# Eviction policy: remove the least recently used keys that have an expiry set.
# This is ideal for a caching + session layer: cached data is evicted first
# while persistent keys (e.g., Celery results) survive if they lack TTL.
maxmemory-policy allkeys-lru

# Sample size for LRU approximation (higher = more accurate, slightly slower)
maxmemory-samples 10

# ---------------------------------------------------------------------------
# Persistence — AOF (Append-Only File) for durability
# ---------------------------------------------------------------------------

# Enable AOF persistence (safer than RDB for Celery task results)
appendonly yes
appendfilename "appendonly.aof"

# Fsync policy: everysec balances performance and durability
# (at most 1 second of data lost on crash)
appendfsync everysec

# Do not block the main process during AOF rewrite
no-appendfsync-on-rewrite yes

# Trigger AOF rewrite when the file doubles in size (and is at least 64mb)
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ---------------------------------------------------------------------------
# RDB Snapshots (supplemental backup)
# ---------------------------------------------------------------------------
save 900 1
save 300 10
save 60 10000

rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ---------------------------------------------------------------------------
# Slow Log — track commands exceeding 10ms
# ---------------------------------------------------------------------------
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---------------------------------------------------------------------------
# Client Management
# ---------------------------------------------------------------------------
maxclients 10000

# ---------------------------------------------------------------------------
# Lua Scripting
# ---------------------------------------------------------------------------
lua-time-limit 5000

# ---------------------------------------------------------------------------
# Latency Monitoring
# ---------------------------------------------------------------------------
latency-monitor-threshold 100

# ---------------------------------------------------------------------------
# Active Defragmentation (Redis 4.0+)
# ---------------------------------------------------------------------------
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
