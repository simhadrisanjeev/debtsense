# =============================================================================
# Alembic Configuration — DebtSense
# =============================================================================
#
# This file configures Alembic for async PostgreSQL migrations.
# The actual database URL is overridden at runtime by
# database/migrations/env.py from app.core.config.settings.
#
# Run migrations:
#   alembic -c backend/alembic.ini upgrade head
#
# Generate a new migration:
#   alembic -c backend/alembic.ini revision --autogenerate -m "description"
# =============================================================================

[alembic]
# Path to the migration scripts directory (relative to this .ini file's parent)
script_location = ../database/migrations

# Template used to generate new migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for the file_template create_date token
timezone = UTC

# Truncate long revision identifiers to this many characters
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# Placeholder database URL — overridden at runtime by env.py using
# app.core.config.settings.DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://debtsense_user:change_me_in_production@localhost:5432/debtsense

# Version table name (default is alembic_version)
# version_table = alembic_version

# Store version numbers as integer rather than full hex strings
# version_num_width = 32

# Max number of migration heads at any time (to prevent branching)
# heads = 1

# Prepend the current date when generating a new migration
# prepend_date = True

[post_write_hooks]
# Run ruff format on newly generated migration files
# hooks = ruff_format
# ruff_format.type = exec
# ruff_format.executable = ruff
# ruff_format.options = format REVISION_SCRIPT_FILENAME

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
