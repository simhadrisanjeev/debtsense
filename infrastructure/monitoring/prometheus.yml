# =============================================================================
# DebtSense — Prometheus Scrape Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: debtsense
    environment: production

# =============================================================================
# Alerting — forward to Alertmanager
# =============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# =============================================================================
# Recording and alerting rules
# =============================================================================
rule_files:
  - /etc/prometheus/rules/*.yml

# =============================================================================
# Scrape configurations
# =============================================================================
scrape_configs:

  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ---------------------------------------------------------------------------
  # DebtSense Backend — FastAPI /metrics endpoint
  # ---------------------------------------------------------------------------
  - job_name: debtsense-backend
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - backend:8000
        labels:
          service: backend
          component: api
    # If running in Kubernetes, use the service discovery config below instead:
    # kubernetes_sd_configs:
    #   - role: pod
    # relabel_configs:
    #   - source_labels: [__meta_kubernetes_pod_label_app]
    #     regex: debtsense
    #     action: keep
    #   - source_labels: [__meta_kubernetes_pod_label_component]
    #     regex: backend
    #     action: keep
    #   - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
    #     target_label: __metrics_path__
    #   - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
    #     separator: ':'
    #     target_label: __address__

  # ---------------------------------------------------------------------------
  # PostgreSQL — via postgres_exporter
  # ---------------------------------------------------------------------------
  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: postgres
          component: database

  # ---------------------------------------------------------------------------
  # Redis — via redis_exporter
  # ---------------------------------------------------------------------------
  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
          component: cache

  # ---------------------------------------------------------------------------
  # Celery — via celery-exporter (flower)
  # ---------------------------------------------------------------------------
  - job_name: celery
    static_configs:
      - targets:
          - celery-exporter:9808
        labels:
          service: celery
          component: worker

  # ---------------------------------------------------------------------------
  # Node exporter — host-level metrics
  # ---------------------------------------------------------------------------
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          component: host

  # ---------------------------------------------------------------------------
  # Nginx — via nginx-exporter (stub_status)
  # ---------------------------------------------------------------------------
  - job_name: nginx
    static_configs:
      - targets:
          - nginx-exporter:9113
        labels:
          service: nginx
          component: proxy
