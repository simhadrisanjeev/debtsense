# =============================================================================
# DebtSense — Kubernetes Backend Deployment
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: debtsense-backend
  labels:
    app: debtsense
    component: backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: debtsense
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: debtsense
        component: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: debtsense-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30

      containers:
        - name: backend
          image: debtsense-backend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # --- Environment variables from ConfigMap and Secret ---
          envFrom:
            - configMapRef:
                name: debtsense-backend-config
            - secretRef:
                name: debtsense-backend-secrets

          # --- Resource limits ---
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

          # --- Health probes ---
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12  # up to 60s for cold starts

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          # --- Lifecycle hooks ---
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]  # drain in-flight requests

      # --- Pod topology ---
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: debtsense
                    component: backend
                topologyKey: kubernetes.io/hostname

---
# =============================================================================
# ConfigMap — non-sensitive backend configuration
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: debtsense-backend-config
  labels:
    app: debtsense
    component: backend
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  API_PREFIX: "/api/v1"
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  BACKEND_WORKERS: "4"
  POSTGRES_HOST: "debtsense-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "debtsense"
  REDIS_HOST: "debtsense-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  LOG_LEVEL: "WARNING"
  LOG_FORMAT: "json"
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4"
  CORS_ORIGINS: "https://app.debtsense.io"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_BURST: "10"

---
# =============================================================================
# PodDisruptionBudget — ensure availability during cluster operations
# =============================================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: debtsense-backend-pdb
  labels:
    app: debtsense
    component: backend
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: debtsense
      component: backend

---
# =============================================================================
# HorizontalPodAutoscaler
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: debtsense-backend-hpa
  labels:
    app: debtsense
    component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: debtsense-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
