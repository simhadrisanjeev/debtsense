# =============================================================================
# DebtSense — Kustomize Base
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: debtsense-base

namespace: debtsense

commonLabels:
  app.kubernetes.io/name: debtsense
  app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml

# Images can be overridden per environment overlay
images:
  - name: debtsense-backend
    newName: debtsense-backend
    newTag: latest
